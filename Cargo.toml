[package]
name = "construct-tui"
version = "0.1.0"
edition = "2024"

[dependencies]
construct-core = { path = "../construct-core", features = ["desktop", "post-quantum"] }
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
anyhow = "1"
futures = "0.3"

# gRPC / proto
tonic = { version = "0.12", features = ["tls", "tls-native-roots"] }
prost = "0.13"

# Config & storage
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"

# Crypto helpers
rand = "0.8"
hex = "0.4"
ed25519-dalek = { version = "2.0", features = ["std", "rand_core"] }
base64 = "0.22.1"

[build-dependencies]
tonic-build = "0.12"

