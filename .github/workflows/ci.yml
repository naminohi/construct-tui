name: CI

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: konstrukt

jobs:
  # ── 1. Lint + Test ─────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: construct-tui
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4
        with:
          path: construct-tui

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-core
          path: construct-core

      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-ice
          path: construct-ice

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-tui/target/
          key: linux-x64-cargo-${{ hashFiles('construct-tui/Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Install system deps (OpenSSL, pkg-config, protoc)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: cargo fmt check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ── 2. Build — Linux x86_64 ────────────────────────────────────────────────
  build-linux-x64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: construct-tui
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4
        with:
          path: construct-tui

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-core
          path: construct-core

      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-ice
          path: construct-ice

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-tui/target/
          key: linux-x64-cargo-release-${{ hashFiles('construct-tui/Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Build release
        run: cargo build --release

      - name: Package artifact
        run: mv target/release/${{ env.BIN_NAME }} ../konstrukt-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konstrukt-linux-x86_64
          path: konstrukt-linux-x86_64
          retention-days: 7

  # ── 3. Build — Linux aarch64 (RPi 4 / ARM servers) ─────────────────────────
  build-linux-aarch64:
    name: Build Linux aarch64
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: construct-tui
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4
        with:
          path: construct-tui

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-core
          path: construct-core

      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-ice
          path: construct-ice

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-tui/target/
          key: linux-aarch64-cargo-release-${{ hashFiles('construct-tui/Cargo.lock') }}
          restore-keys: linux-aarch64-cargo-

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            pkg-config \
            libssl-dev:arm64 \
            protobuf-compiler \
            --no-install-recommends || \
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config protobuf-compiler

      - name: Build release (cross)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: /usr/aarch64-linux-gnu
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package artifact
        run: mv target/aarch64-unknown-linux-gnu/release/${{ env.BIN_NAME }} ../konstrukt-linux-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konstrukt-linux-aarch64
          path: konstrukt-linux-aarch64
          retention-days: 7

  # ── 4. Build — macOS Apple Silicon ────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    needs: lint-and-test
    defaults:
      run:
        working-directory: construct-tui
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4
        with:
          path: construct-tui

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-core
          path: construct-core

      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-ice
          path: construct-ice

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-tui/target/
          key: macos-arm64-cargo-release-${{ hashFiles('construct-tui/Cargo.lock') }}
          restore-keys: macos-arm64-cargo-

      - name: Install protoc (macOS)
        run: brew install protobuf

      - name: Build release
        run: cargo build --release

      - name: Package artifact
        run: mv target/release/${{ env.BIN_NAME }} ../konstrukt-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konstrukt-macos-arm64
          path: konstrukt-macos-arm64
          retention-days: 7

  # ── 5. Build — macOS Intel ─────────────────────────────────────────────────
  build-macos-x64:
    name: Build macOS x86_64
    runs-on: macos-13
    needs: lint-and-test
    defaults:
      run:
        working-directory: construct-tui
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4
        with:
          path: construct-tui

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-core
          path: construct-core

      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-ice
          path: construct-ice

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-tui/target/
          key: macos-x64-cargo-release-${{ hashFiles('construct-tui/Cargo.lock') }}
          restore-keys: macos-x64-cargo-

      - name: Install protoc (macOS)
        run: brew install protobuf

      - name: Build release
        run: cargo build --release

      - name: Package artifact
        run: mv target/release/${{ env.BIN_NAME }} ../konstrukt-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konstrukt-macos-x86_64
          path: konstrukt-macos-x86_64
          retention-days: 7

  # ── 6. GitHub Release (on tag push) ───────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-linux-aarch64
      - build-macos-arm64
      - build-macos-x64
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: konstrukt-linux-x86_64,  path: dist/ }
      - uses: actions/download-artifact@v4
        with: { name: konstrukt-linux-aarch64, path: dist/ }
      - uses: actions/download-artifact@v4
        with: { name: konstrukt-macos-arm64,   path: dist/ }
      - uses: actions/download-artifact@v4
        with: { name: konstrukt-macos-x86_64,  path: dist/ }

      - name: Package archives + checksums
        run: |
          cd dist
          chmod +x konstrukt-*
          for f in konstrukt-*; do
            tar -czf "${f}.tar.gz" "$f"
          done
          sha256sum *.tar.gz > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/konstrukt-linux-x86_64.tar.gz
            dist/konstrukt-linux-aarch64.tar.gz
            dist/konstrukt-macos-arm64.tar.gz
            dist/konstrukt-macos-x86_64.tar.gz
            dist/SHA256SUMS

