name: CI

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: konstrukt

jobs:
  # ── 1. Lint + Test ─────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Install system deps (OpenSSL, pkg-config, protoc)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: cargo fmt check
        run: cargo fmt -- --check

      - name: cargo clippy
        env:
          CONSTRUCT_PROTOS_DIR: ${{ github.workspace }}/construct-protos
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        env:
          CONSTRUCT_PROTOS_DIR: ${{ github.workspace }}/construct-protos
        run: cargo test

  # ── 2. Build — Linux x86_64 ────────────────────────────────────────────────
  build-linux-x64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x64-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Build release
        env:
          CONSTRUCT_PROTOS_DIR: ${{ github.workspace }}/construct-protos
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konstrukt-linux-x86_64
          path: target/release/${{ env.BIN_NAME }}
          retention-days: 7

  # ── 3. Build — macOS Apple Silicon ────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    needs: lint-and-test
    steps:
      - name: Checkout construct-tui
        uses: actions/checkout@v4

      - name: Checkout construct-protos
        uses: actions/checkout@v4
        with:
          repository: maximeliseyev/construct-protos
          path: construct-protos

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-arm64-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-arm64-cargo-

      - name: Install protoc (macOS)
        run: brew install protobuf

      - name: Build release
        env:
          CONSTRUCT_PROTOS_DIR: ${{ github.workspace }}/construct-protos
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konstrukt-macos-arm64
          path: target/release/${{ env.BIN_NAME }}
          retention-days: 7

  # ── 4. GitHub Release (on tag push) ───────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-macos-arm64
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: konstrukt-linux-x86_64, path: dist/ }
      - uses: actions/download-artifact@v4
        with: { name: konstrukt-macos-arm64,  path: dist/ }

      - name: Package archives + checksums
        run: |
          cd dist
          chmod +x konstrukt-*
          mv konstrukt-linux-x86_64 konstrukt-linux-x86_64-bin
          mv konstrukt-macos-arm64 konstrukt-macos-arm64-bin
          tar -czf konstrukt-linux-x86_64.tar.gz -C . konstrukt-linux-x86_64-bin
          tar -czf konstrukt-macos-arm64.tar.gz -C . konstrukt-macos-arm64-bin
          sha256sum *.tar.gz > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/konstrukt-linux-x86_64.tar.gz
            dist/konstrukt-macos-arm64.tar.gz
            dist/SHA256SUMS
